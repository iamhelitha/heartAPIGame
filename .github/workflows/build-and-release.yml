name: Build Executable And Upload To Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (for example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Build jlink executable image (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw -B -ntp clean javafx:jlink

      - name: Build jlink executable image (Windows)
        if: runner.os == 'Windows'
        run: .\\mvnw.cmd -B -ntp clean javafx:jlink

      - name: Prepare release asset (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f target/app.zip ]; then
            echo "Expected file target/app.zip was not produced."
            ls -la target
            exit 1
          fi
          cp target/app.zip heartAPIGame-${{ runner.os }}-${{ env.RELEASE_TAG }}.zip

      - name: Prepare release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "target/app.zip")) {
            Write-Host "Expected file target/app.zip was not produced."
            Get-ChildItem target
            exit 1
          }
          Copy-Item "target/app.zip" "heartAPIGame-${{ runner.os }}-${{ env.RELEASE_TAG }}.zip"

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: heartAPIGame-${{ runner.os }}-${{ env.RELEASE_TAG }}.zip
          overwrite_files: true
